- JWT or json web token
    => هنديك تذكرة عليها بياناتك بحيث لما تروح اي مكان في الموقع السيرفر يسمحلك JWT السيرفر مش بيحفظ انت اونلاين ولا لاء ومش بيحفظ بياناتك بالـ 
    => 1- Header: عليه نوع التوكن وخوارزمية التشفير
        2- Payload: Email, id بياناتك الـ 
         3- signature: mix between the Secret key and the payload, the 2 companied gives the signature
                       Secret key is made by Server
                      لو مطلعش نفس التوقيع السيرفر ميدخلكش secret key ويخلطه تاني بالـ  payload لما تعدل الداتا بتاعتك وتبعت التوكن للسيرفر هياخد الـ   
                        الاحتيال بيتم ان المخترق بيغير البيانات بدل 1000 خليهم مليون فلما يخش يسحب الفلوس السيرفر يخلط البيانات الجديدة بالسيكريت كي فالتوقيع يطلع مختلف فتظهر عملية الاحتيال
                        


